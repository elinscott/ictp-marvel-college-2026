---
- name: Apply post-distribution school updates
  hosts: localhost
  connection: local
  become: true
  gather_facts: false
  tasks:

  - name: Check if pint is installed in the qe conda env
    become_user: max
    ansible.builtin.stat:
      path: ~/.conda/envs/qe/lib/python3.13/site-packages/pint/__init__.py
    register: pint_installed

  - name: Install qe-tools (alpha + pint extra) into the qe conda env
    become_user: max
    ansible.builtin.command:
      cmd: >
        ~/.conda/envs/qe/bin/pip install --upgrade --pre qe-tools[pint]
    when: not pint_installed.stat.exists
    changed_when: true

  - name: Check installed ase-koopmans version in the koopmans conda env
    become_user: max
    ansible.builtin.command:
      cmd: ~/.conda/envs/koopmans/bin/pip show ase-koopmans
    register: ase_koopmans_show
    changed_when: false
    failed_when: false

  - name: Install ase-koopmans 0.1.13 into the koopmans conda env
    become_user: max
    ansible.builtin.command:
      cmd: ~/.conda/envs/koopmans/bin/pip install ase-koopmans==0.1.13
    when: "'Version: 0.1.13' not in ase_koopmans_show.stdout"
    changed_when: true
